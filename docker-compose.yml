version: '3.8'

services:
  backend:
    build: ./backend
    container_name: tcc-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /app

  frontend:
    build: ./frontend
    container_name: tcc-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    working_dir: /app
    depends_on:
      - backend
